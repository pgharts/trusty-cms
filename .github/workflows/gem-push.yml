name: Ruby Gem

on:
  push:
    branches: [ master ]
    paths: [ 'lib/trusty_cms/version.rb' ]

jobs:
  build:
    name: Build + Publish
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Ruby 3.3.4
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.4'
          bundler-cache: true

      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@main

      - name: Build gem
        run: |
          echo "GEM_FILE=$(ruby -e 'spec = Gem::Specification.load(\"trusty_cms.gemspec\"); print \"#{spec.name}-#{spec.version}.gem\"')" >> "$GITHUB_ENV"
          gem build trusty_cms.gemspec

      - name: Publish gem
        run: gem push "$GEM_FILE"

      - name: Remove gem build file
        if: always()
        run: |
          if [ -n "${GEM_FILE:-}" ]; then
            rm -f "$GEM_FILE"
          fi
